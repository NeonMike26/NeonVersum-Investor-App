<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Login zum NeonVersum Investor Portal."
    >

    <title>Login | NeonVersum Investor Portal</title>

    <link rel="stylesheet" href="../css/app.css">
</head>

<body>

    <main class="auth-page">

        <section class="auth-card">

            <a class="auth-brand" href="../index.html">
                <span class="brand-icon">NV</span>
                <span>NeonVersum</span>
            </a>

            <div class="auth-heading">

                <p class="eyebrow">
                    Investor Portal
                </p>

                <h1 class="auth-title">
                    Willkommen zurück
                </h1>

                <p class="auth-description">
                    Melde dich an, um deine Investments,
                    Dokumente und Updates aufzurufen.
                </p>

            </div>

            <form class="auth-form" id="login-form" novalidate>

    <div class="form-group">

        <label for="email">
            E-Mail-Adresse
        </label>

        <input
            id="email"
            name="email"
            type="email"
            placeholder="name@beispiel.de"
            autocomplete="email"
            required
        >

        <p class="form-error" id="email-error"></p>

    </div>

    <div class="form-group">

        <div class="label-row">

            <label for="password">
                Passwort
            </label>

            <a class="text-link" href="#">
                Passwort vergessen?
            </a>

        </div>

        <div class="password-field">

            <input
                id="password"
                name="password"
                type="password"
                placeholder="Dein Passwort"
                autocomplete="current-password"
                minlength="8"
                required
            >

            <button
                class="password-toggle"
                type="button"
                aria-label="Passwort anzeigen"
            >
                Anzeigen
            </button>

        </div>

        <p class="form-error" id="password-error"></p>

    </div>

    <label class="checkbox-row">

        <input
            name="remember"
            type="checkbox"
        >

        <span>
            Auf diesem Gerät angemeldet bleiben
        </span>

    </label>

    <p class="form-status" id="form-status" aria-live="polite"></p>

    <button
        class="button button-primary auth-submit"
        id="login-button"
        type="submit"
    >
        <span class="button-text">
            Sicher anmelden
        </span>

        <span class="button-loader" aria-hidden="true"></span>
    </button>

</form>

            <p class="auth-footer">

                Noch keinen Zugang?

                <a class="text-link" href="#">
                    Registrierung anfragen
                </a>

            </p>

            <a class="back-link" href="../index.html">
                ← Zurück zur Startseite
            </a>

        </section>

    </main>

    <script src="../js/app.js?v=10"></script>

</body>

</html>
