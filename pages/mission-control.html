<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Mission Control | NeonVersum</title>

<link rel="stylesheet" href="../css/app.css?v=40">
<link rel="stylesheet" href="../css/mission-control.css?v=7">
    
</head>

<body>

<main class="mission-control">

    <div class="space-background"></div>

    <section class="mission-stage">

    <div class="orbit orbit-primary" aria-label="Mission Control Navigation">

        <a class="orbit-item orbit-item-1" href="#">
            <span class="orbit-dot"></span>
            <span class="orbit-label">Dashboard</span>
        </a>

        <a class="orbit-item orbit-item-2" href="#">
            <span class="orbit-dot"></span>
            <span class="orbit-label">Investments</span>
        </a>

        <a class="orbit-item orbit-item-3" href="#">
            <span class="orbit-dot"></span>
            <span class="orbit-label">Dokumente</span>
        </a>

        <a class="orbit-item orbit-item-4" href="#">
            <span class="orbit-dot"></span>
            <span class="orbit-label">Updates</span>
        </a>

    </div>

    <section class="planet-center">

        <img
            src="../images/PNG LOGO.png"
            alt="NeonVersum"
            class="planet-logo"
        >

    </section>

</section>

</main>

<script src="../js/app.js?v=22"></script>
<script src="../js/mission-control.js?v=5"></script>
    
</body>

</html>
