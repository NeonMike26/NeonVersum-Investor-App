<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Das offizielle Investor Portal von NeonVersum."
    >

    <title>NeonVersum Investor Portal</title>

    <link rel="stylesheet" href="css/app.css">
</head>

<body>

    <main class="landing-page">

        <section class="hero">

            <div class="brand">
                <div class="brand-icon">NV</div>

                <p class="brand-name">
                    NeonVersum
                </p>
            </div>

            <div class="hero-content">

                <p class="eyebrow">
                    Official Investor Portal
                </p>

                <h1>
                    Willkommen im<br>
                    <span>NeonVersum</span>
                </h1>

                <p class="hero-text">
                    Dein persönlicher Zugang zu Investments,
                    Dokumenten und exklusiven Unternehmensupdates.
                </p>

                <div class="hero-actions">

                    <a
                        class="button button-primary"
                        href="pages/login.html"
                    >
                        Anmelden
                    </a>

                    <a
                        class="button button-secondary"
                        href="pages/register.html"
                    >
                        Registrieren
                    </a>

                </div>

            </div>

            <p class="version">
                Investor App · Version 0.1.0
            </p>

        </section>

    </main>

    <script src="js/app.js"></script>

</body>

</html>
